services:
  proxy-gateway:
    image: nginx:stable-alpine
    container_name: ai_proxy_gateway
    ports:
      - "8080:80" # Port visible via Tailscale
    volumes:
      - ./proxy/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro # Mount template for envsubst
      - ./proxy/auth.conf.template:/etc/nginx/templates/auth.conf.template:ro # Included by nginx.conf.template
      - ./proxy/logs:/var/log/nginx # Mount log directory
    extra_hosts:
      - "host.docker.internal:host-gateway" # Linux compatibility for host access
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GATEWAY_API_KEYS=${GATEWAY_API_KEYS}
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx
      # Do not fall back to LAN_IP here. LAN_IP/AIHUB_IP is the public gateway
      # address clients use, while LMSTUDIO_HOST is the upstream nginx should
      # contact from inside the container.
      - LMSTUDIO_HOST=${LMSTUDIO_HOST:-host.docker.internal}
      - NGINX_ENVSUBST_FILTER=OPENROUTER_API_KEY|GATEWAY_API_KEYS|LMSTUDIO_HOST
    restart: unless-stopped

  llama_cpp:
    image: ${LLAMA_CPP_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda}
    container_name: llama_cpp
    command:
      - --model
      - ${LLAMA_CPP_MODEL:-/models/model.gguf}
      - --alias
      - ${LLAMA_CPP_MODEL_ALIAS:-local-gguf}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --ctx-size
      - ${LLAMA_CPP_CTX_SIZE:-8192}
      - --parallel
      - ${LLAMA_CPP_PARALLEL:-2}
      - --n-gpu-layers
      - ${LLAMA_CPP_N_GPU_LAYERS:-999}
    volumes:
      - ${LLAMA_CPP_MODELS_DIR:-./llama-models}:/models:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${LLAMA_CPP_NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  faster-whisper:
    image: lscr.io/linuxserver/faster-whisper:latest
    container_name: faster-whisper # remove if not using NVIDIA GPU
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Istanbul
      - WHISPER_MODEL=base-int8
      - WHISPER_BEAM=1
    volumes:
      - ./faster-whisper-data:/config
    restart: unless-stopped

  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: kokoro
    environment:
      - TZ=Europe/Istanbul
    restart: unless-stopped

  faster_whisper_rest:
    build: ./faster_whisper_rest
    image: aihub/faster-whisper-rest:latest
    container_name: faster_whisper_rest
    volumes:
      - ./faster-whisper-data:/config # if you want to reuse the model cache/config
    environment:
      - WHISPER_MODEL=small
      - DEVICE=cuda
      - COMPUTE_TYPE=float16
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
